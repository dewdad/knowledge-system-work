# Schema: secrets/<source_id>.yaml
#
# Read by the source-pull workflow when a source's `auth_ref` points into the
# gitignored `secrets/` directory. One file per source. KSW never commits
# secrets; the directory is added to `.gitignore` by `/init`.
#
# A valid file matches exactly ONE of three credential shapes:
#   - bearer / API key      → { token }
#   - basic auth            → { username, password }
#   - OAuth2 client creds   → { client_id, client_secret, scope? }
#
# Optional: `expires_at` may be set as a hint for the agent to refresh.

$schema: "http://json-schema.org/draft-07/schema#"
title: "KSW Source Secret"
type: object
additionalProperties: false
oneOf:
  - required: [token]
  - required: [username, password]
  - required: [client_id, client_secret]
properties:
  token:
    type: string
    description: "Bearer token or API key"
  username:
    type: string
    description: "Basic-auth username"
  password:
    type: string
    description: "Basic-auth password"
  client_id:
    type: string
    description: "OAuth2 client identifier"
  client_secret:
    type: string
    description: "OAuth2 client secret"
  scope:
    type: string
    description: "OAuth2 scope, optional"
  expires_at:
    type: string
    format: date-time
    description: "Optional expiry hint (ISO 8601). Agent should refresh before this time."
