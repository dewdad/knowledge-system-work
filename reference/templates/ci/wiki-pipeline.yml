# Wiki Pipeline Fragment
# Include in instance .gitlab-ci.yml via: include: local: '.system/templates/ci/wiki-pipeline.yml'

wiki-lint:
  stage: validate
  rules:
    - changes:
        - "wiki/**/*"
  script:
    - echo "Validating wiki structure..."
    - |
      python3 - <<'PY'
      import re
      import sys
      from pathlib import Path

      wiki = Path("wiki")
      pages = [p for p in wiki.rglob("*.md") if "/_graph/" not in p.as_posix()]
      by_stem = {p.stem.lower(): p for p in pages}
      by_rel = {p.with_suffix("").as_posix().lower(): p for p in pages}
      broken = []

      for page in pages:
          text = page.read_text(encoding="utf-8", errors="ignore")
          for raw in re.findall(r"\[\[([^\]]+)\]\]", text):
              target = raw.split("|", 1)[0].split("#", 1)[0].strip()
              if not target:
                  continue
              key = target.replace("\\", "/").lower()
              if key not in by_rel and key not in by_stem:
                  broken.append((page, raw))

      for page, raw in broken:
          print(f"BROKEN LINK: {page} -> [[{raw}]]")
      if broken:
          print(f"Found {len(broken)} broken wikilinks")
          sys.exit(1)
      PY
    - echo "Wiki validation passed"

wiki-orphan-check:
  stage: validate
  rules:
    - changes:
        - "wiki/**/*"
  script:
    - echo "Checking for orphaned pages..."
    - |
      # Find pages not linked from any other page
      for file in $(find wiki/ -name "*.md" -type f -not -path "wiki/_*"); do
        BASENAME=$(basename "$file" .md)
        LINKS=$(grep -r "\[\[${BASENAME}" wiki/ --include="*.md" -l | grep -v "$file" | wc -l)
        if [ "$LINKS" -eq 0 ] && [ "$BASENAME" != "index" ]; then
          echo "ORPHAN: ${file} (no incoming links)"
        fi
      done
